name: 'Azure Terraform CI/CD Pipeline'

on:
  push:
    branches:
      - main
    # This ensures the pipeline ONLY runs if a file inside this folder changes
    paths:
      - 'azure-infrastructure/**'
  workflow_dispatch: # Allows you to still trigger it manually via the UI button

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Azure Terraform Deploy'
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Log in to Azure using GitHub Secrets / OIDC
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Step 3: Setup Terraform on the GitHub Runner
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    # Step 4: Initialize Terraform with the Cloud Backend
    - name: Terraform Init
      run: |
        cd azure-infrastructure
        terraform init

    # Step 5: Generate a deployment plan
    - name: Terraform Plan
      run: |
        cd azure-infrastructure
        terraform plan

    # Step 6: Apply changes and deploy the infrastructure
    - name: Terraform Apply
      run: |
        cd azure-infrastructure
        terraform apply -auto-approve
